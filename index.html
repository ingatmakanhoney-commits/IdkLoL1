<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dandy's World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    .dandy {
      font-size: 120px;
      display: inline-block;
      animation: float 3s ease-in-out infinite;
    }

    .thinking {
      font-size: 50px;
      margin-top: 10px;
      opacity: 0.9;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>Dandy's World</h1>

    <!-- Dandy looking at you (represented by a character) -->
    <div class="dandy">🧐</div>

    <!-- Smart thinking emoji -->
    <div class="thinking">🤔 Thinking deeply...</div>
  </div>
</body>
</html>
