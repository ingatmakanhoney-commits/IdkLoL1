<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spinning Cat Battle</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial, sans-serif; }
  canvas { display: block; background: #1a1a2e; }
  #ui { position: fixed; top: 10px; left: 10px; font-size: 18px; }
</style>
</head>
<body>
<div id="ui">Arrow keys to move | 🔴 = destroyable | ☠️ = deadly (chases + dashes every 10s)</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cat = { x: canvas.width/2, y: canvas.height/2, size: 40, angle: 0, speed: 4, alive: true };
let keys = {};
let enemies = []; // 🔴 harmless (removed on touch)
let skulls = [];  // ☠️ deadly
let lastDash = Date.now();

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Spawn harmless enemies
setInterval(() => {
  enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 30 });
}, 1500);

// Spawn skull enemies (deadly)
setInterval(() => {
  skulls.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 28, vx: 0, vy: 0, dash: false, charging: false });
}, 2500);

function update() {
  if (!cat.alive) return;

  // Movement
  if (keys["ArrowUp"]) cat.y -= cat.speed;
  if (keys["ArrowDown"]) cat.y += cat.speed;
  if (keys["ArrowLeft"]) cat.x -= cat.speed;
  if (keys["ArrowRight"]) cat.x += cat.speed;

  cat.angle += 0.1;

  // Remove harmless enemies on touch
  enemies = enemies.filter(e => {
    let dx = cat.x - e.x;
    let dy = cat.y - e.y;
    return Math.hypot(dx, dy) > cat.size;
  });

  // Skull behavior (CHASE)
  skulls.forEach(s => {
    if (!s.dash) {
      let dx = cat.x - s.x;
      let dy = cat.y - s.y;
      let dist = Math.hypot(dx, dy);
      let speed = 1.5;
      s.vx = (dx/dist) * speed;
      s.vy = (dy/dist) * speed;
      s.x += s.vx;
      s.y += s.vy;
    } else {
      s.x += s.vx;
      s.y += s.vy;
    }
  });

  // Charging phase before dash (last 2 seconds of timer)
  let elapsed = (Date.now() - lastDash) / 1000;
  let timeLeft = 10 - Math.floor(elapsed);

  skulls.forEach(s => {
    s.charging = (timeLeft <= 2);
  });

  // DASH every 10 seconds
  if (Date.now() - lastDash > 10000) {
    skulls.forEach(s => {
      let dx = cat.x - s.x;
      let dy = cat.y - s.y;
      let dist = Math.hypot(dx, dy);
      let dashSpeed = 7;
      s.vx = (dx/dist) * dashSpeed;
      s.vy = (dy/dist) * dashSpeed;
      s.dash = true;

      setTimeout(() => { s.dash = false; }, 1000);
    });
    lastDash = Date.now();
  }

  // Skull kills player on contact (especially during dash)
  skulls.forEach(s => {
    let dx = cat.x - s.x;
    let dy = cat.y - s.y;
    if (Math.hypot(dx, dy) < cat.size) {
      cat.alive = false;
    }
  });
}

function drawCat() {
  ctx.save();
  ctx.translate(cat.x, cat.y);
  ctx.rotate(cat.angle);
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🐱", 0, 0);
  ctx.restore();
}

// Load death image
const pepeImg = new Image();
pepeImg.src = "Lol.png";
</script>
</body>
</html>
