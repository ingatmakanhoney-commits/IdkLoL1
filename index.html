<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spinning Cat Battle</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
    background: #1a1a2e;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    font-size: 18px;
  }
</style>
</head>
<body>
<div id="ui">Use arrow keys to move | Avoid skulls ☠️ | Hit enemies 🔴</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cat = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 40,
  angle: 0,
  speed: 4,
  alive: true
};

let keys = {};

let enemies = [];
let hazards = [];

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Spawn enemies
setInterval(() => {
  enemies.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 30
  });
}, 1500);

// Spawn deadly items
setInterval(() => {
  hazards.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: 25
  });
}, 3000);

function update() {
  if (!cat.alive) return;

  if (keys["ArrowUp"]) cat.y -= cat.speed;
  if (keys["ArrowDown"]) cat.y += cat.speed;
  if (keys["ArrowLeft"]) cat.x -= cat.speed;
  if (keys["ArrowRight"]) cat.x += cat.speed;

  cat.angle += 0.1;

  // Collision with enemies (you "kill" them)
  enemies = enemies.filter(e => {
    let dx = cat.x - e.x;
    let dy = cat.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    return dist > cat.size;
  });

  // Collision with hazards (you die)
  hazards.forEach(h => {
    let dx = cat.x - h.x;
    let dy = cat.y - h.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < cat.size) {
      cat.alive = false;
    }
  });
}

function drawCat() {
  ctx.save();
  ctx.translate(cat.x, cat.y);
  ctx.rotate(cat.angle);

  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🐱", 0, 0);

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawCat();

  // Draw enemies
  enemies.forEach(e => {
    ctx.font = "30px Arial";
    ctx.fillText("🔴", e.x, e.y);
  });

  // Draw hazards
  hazards.forEach(h => {
    ctx.font = "25px Arial";
    ctx.fillText("☠️", h.x, h.y);
  });

  if (!cat.alive) {
    ctx.fillStyle = "white";
    ctx.font = "50px Arial";
    ctx.fillText("Game Over", canvas.width/2, canvas.height/2);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
