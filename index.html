<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spinning Cat Battle</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; color: white; font-family: Arial, sans-serif; }
  canvas { display: block; background: #1a1a2e; }
  #ui { position: fixed; top: 10px; left: 10px; font-size: 18px; }
</style>
</head>
<body>
<div id="ui">Arrow keys to move | Touch 🔴 to clear | Avoid ☠️ | Every 10s enemies dash!</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let cat = { x: canvas.width/2, y: canvas.height/2, size: 40, angle: 0, speed: 4, alive: true };
let keys = {};
let enemies = [];
let hazards = [];
let lastDash = Date.now();

// Controls
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Spawn enemies (they will chase)
setInterval(() => {
  enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 30, vx: 0, vy: 0, dash: false });
}, 1500);

// Spawn hazards
setInterval(() => {
  hazards.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: 25 });
}, 3000);

function update() {
  if (!cat.alive) return;

  // Movement
  if (keys["ArrowUp"]) cat.y -= cat.speed;
  if (keys["ArrowDown"]) cat.y += cat.speed;
  if (keys["ArrowLeft"]) cat.x -= cat.speed;
  if (keys["ArrowRight"]) cat.x += cat.speed;

  cat.angle += 0.1;

  // Enemy movement (slow chase)
  enemies.forEach(e => {
    if (!e.dash) {
      let dx = cat.x - e.x;
      let dy = cat.y - e.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let speed = 1.2;
      e.vx = (dx/dist) * speed;
      e.vy = (dy/dist) * speed;
    }
    e.x += e.vx;
    e.y += e.vy;
  });

  // Every 10 seconds → DASH attack
  if (Date.now() - lastDash > 10000) {
    enemies.forEach(e => {
      let dx = cat.x - e.x;
      let dy = cat.y - e.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      let dashSpeed = 6;
      e.vx = (dx/dist) * dashSpeed;
      e.vy = (dy/dist) * dashSpeed;
      e.dash = true;

      // Reset dash after short time
      setTimeout(() => { e.dash = false; }, 1000);
    });
    lastDash = Date.now();
  }

  // Kill enemies if touched
  enemies = enemies.filter(e => {
    let dx = cat.x - e.x;
    let dy = cat.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    return dist > cat.size;
  });

  // Hazards kill player
  hazards.forEach(h => {
    let dx = cat.x - h.x;
    let dy = cat.y - h.y;
    let dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < cat.size) cat.alive = false;
  });

  // Enemies kill player ONLY during dash
  enemies.forEach(e => {
    if (e.dash) {
      let dx = cat.x - e.x;
      let dy = cat.y - e.y;
      let dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < cat.size) cat.alive = false;
    }
  });
}

function drawCat() {
  ctx.save();
  ctx.translate(cat.x, cat.y);
  ctx.rotate(cat.angle);
  ctx.font = "40px Arial";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("🐱", 0, 0);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (cat.alive) drawCat();

  // Enemies
  enemies.forEach(e => {
    ctx.font = "30px Arial";
    ctx.fillText(e.dash ? "⚡" : "🔴", e.x, e.y);
  });

  // Hazards
  hazards.forEach(h => {
    ctx.font = "25px Arial";
    ctx.fillText("☠️", h.x, h.y);
  });

  // Timer display
  let timeLeft = Math.max(0, 10 - Math.floor((Date.now() - lastDash)/1000));
  ctx.font = "20px Arial";
  ctx.fillText("Dash in: " + timeLeft + "s", 20, 50);

  if (!cat.alive) {
    ctx.font = "50px Arial";
    ctx.textAlign = "center";
    ctx.fillText("💀 Game Over 💀", canvas.width/2, canvas.height/2 - 40);
    ctx.font = "30px Arial";
    ctx.fillText("The cat has fainted!", canvas.width/2, canvas.height/2 + 10);
    ctx.font = "60px Arial";
    ctx.fillText("😵", canvas.width/2, canvas.height/2 + 80);
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
